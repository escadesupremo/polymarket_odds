<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magyarorszag kovetkezo miniszterelnoke - Polymarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0a1a 0%, #1a0e2e 40%, #12082a 100%);
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
        }

        .card {
            max-width: 680px;
            width: 100%;
            background: linear-gradient(170deg, rgba(75, 0, 130, 0.15) 0%, rgba(30, 15, 60, 0.6) 100%);
            border: 1px solid rgba(106, 13, 173, 0.25);
            border-radius: 24px;
            padding: 2rem;
            box-shadow:
                0 4px 24px rgba(106, 13, 173, 0.15),
                0 1px 3px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .header-title {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.02em;
        }
        .crown-icon {
            width: 28px;
            height: 28px;
            filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.5));
        }
        .header-sub {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: rgba(200, 180, 255, 0.6);
        }
        .header-sub a {
            color: #a78bfa;
            text-decoration: none;
            transition: color 0.2s;
        }
        .header-sub a:hover { color: #c4b5fd; }
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            background: rgba(106, 13, 173, 0.3);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 20px;
            padding: 0.2rem 0.65rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #c084fc;
            margin-top: 0.75rem;
        }
        .live-dot {
            width: 6px;
            height: 6px;
            background: #a855f7;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.6); }
            50% { opacity: 0.6; box-shadow: 0 0 0 4px rgba(168, 85, 247, 0); }
        }

        /* Updated timestamp */
        .updated {
            text-align: center;
            color: rgba(200, 180, 255, 0.35);
            font-size: 0.65rem;
            margin-bottom: 1.25rem;
        }

        /* Candidate rows */
        .candidates { display: flex; flex-direction: column; gap: 0.5rem; }

        .candidate {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.25s ease;
            cursor: default;
        }
        .candidate:hover {
            background: rgba(106, 13, 173, 0.15);
            border-color: rgba(168, 85, 247, 0.2);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(106, 13, 173, 0.15);
        }

        /* Top 3 special styles */
        .candidate.rank-1 {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.08) 0%, rgba(106, 13, 173, 0.12) 100%);
            border-color: rgba(255, 215, 0, 0.2);
        }
        .candidate.rank-2 {
            background: linear-gradient(135deg, rgba(192, 192, 192, 0.06) 0%, rgba(106, 13, 173, 0.1) 100%);
            border-color: rgba(192, 192, 192, 0.15);
        }
        .candidate.rank-3 {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.06) 0%, rgba(106, 13, 173, 0.08) 100%);
            border-color: rgba(205, 127, 50, 0.15);
        }

        .candidate-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            min-width: 0;
        }

        /* Rank badge */
        .rank-badge {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(200, 180, 255, 0.5);
        }
        .rank-1 .rank-badge {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #1a0e2e;
            box-shadow: 0 2px 12px rgba(255, 215, 0, 0.3);
        }
        .rank-2 .rank-badge {
            background: linear-gradient(135deg, #C0C0C0, #A0A0A0);
            color: #1a0e2e;
            box-shadow: 0 2px 12px rgba(192, 192, 192, 0.2);
        }
        .rank-3 .rank-badge {
            background: linear-gradient(135deg, #CD7F32, #A0522D);
            color: #1a0e2e;
            box-shadow: 0 2px 12px rgba(205, 127, 50, 0.2);
        }

        /* Trophy icon for top 3 */
        .trophy-icon {
            width: 20px;
            height: 20px;
        }

        .candidate-info {
            min-width: 0;
        }
        .name {
            font-weight: 700;
            font-size: 1rem;
            color: #f0eaff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Progress bar */
        .bar-bg {
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 2px;
            margin-top: 0.5rem;
            overflow: hidden;
            width: 180px;
        }
        .bar-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, #7c3aed, #a855f7);
            transition: width 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .rank-1 .bar-fill { background: linear-gradient(90deg, #FFD700, #FFA500); }
        .rank-2 .bar-fill { background: linear-gradient(90deg, #C0C0C0, #E0E0E0); }
        .rank-3 .bar-fill { background: linear-gradient(90deg, #CD7F32, #DDA15E); }

        /* Percentage */
        .pct {
            font-size: 1.5rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
            margin-left: 1rem;
            color: #a78bfa;
        }
        .rank-1 .pct { color: #FFD700; }
        .rank-2 .pct { color: #D0D0D0; }
        .rank-3 .pct { color: #DDA15E; }
        .pct.low { color: rgba(200, 180, 255, 0.35); font-size: 1.25rem; }

        /* Footer */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(106, 13, 173, 0.15);
        }
        .volume {
            color: rgba(200, 180, 255, 0.4);
            font-size: 0.7rem;
        }
        .powered-by {
            color: rgba(200, 180, 255, 0.3);
            font-size: 0.65rem;
        }
        .powered-by a {
            color: rgba(200, 180, 255, 0.5);
            text-decoration: none;
        }

        /* Loading / Error */
        .loading {
            text-align: center;
            color: rgba(200, 180, 255, 0.4);
            padding: 3rem 0;
            font-size: 0.85rem;
        }
        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(168, 85, 247, 0.2);
            border-top-color: #a855f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 0.75rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error {
            text-align: center;
            color: #f87171;
            padding: 2rem 0;
            font-size: 0.85rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card { padding: 1.25rem; border-radius: 18px; }
            .header-title { font-size: 1.2rem; }
            .crown-icon { width: 22px; height: 22px; }
            .candidate { padding: 0.75rem 1rem; border-radius: 12px; }
            .rank-badge { width: 34px; height: 34px; font-size: 0.8rem; border-radius: 10px; }
            .trophy-icon { width: 17px; height: 17px; }
            .name { font-size: 0.9rem; }
            .pct { font-size: 1.25rem; }
            .pct.low { font-size: 1rem; }
            .bar-bg { width: 120px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="header-title">
                <svg class="crown-icon" viewBox="0 0 24 24" fill="#FFD700">
                    <path d="M5 16L3 5l5.5 5L12 4l3.5 6L21 5l-2 11H5zm0 2h14v2H5v-2z"/>
                </svg>
                Magyarorszag kovetkezo miniszterelnoke
            </div>
            <div class="header-sub">
                <span class="live-badge"><span class="live-dot"></span> Elo odds a Polymarket API-rol</span>
            </div>
        </div>
        <p class="updated" id="updated"></p>
        <div class="candidates" id="candidates">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div>Elo odds betoltese...</div>
            </div>
        </div>
        <div class="footer">
            <span class="volume" id="volume"></span>
            <span class="powered-by">
                <a href="https://polymarket.com/event/next-prime-minister-of-hungary" target="_blank" rel="noopener">polymarket.com</a>
            </span>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        const PREFIX = 'Will the next Prime Minister of Hungary be ';

        const TROPHY_SVG = `<svg class="trophy-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19 5h-2V4c0-.55-.45-1-1-1H8c-.55 0-1 .45-1 1v1H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H8v2h8v-2h-3v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>`;

        function formatPct(pct) {
            if (pct >= 1) return pct.toFixed(1) + '%';
            if (pct >= 0.01) return pct.toFixed(2) + '%';
            return '< 0.1%';
        }

        async function fetchOdds() {
            const container = document.getElementById('candidates');
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const event = data[0];

                const candidates = [];
                for (const m of event.markets) {
                    const prices = m.outcomePrices;
                    if (!prices) continue;
                    const parsed = typeof prices === 'string' ? JSON.parse(prices) : prices;
                    const yesPct = parseFloat(parsed[0]) * 100;
                    let name = m.question.replace(PREFIX, '').replace('?', '');
                    if (name === 'another person') name = 'Mas szemely';
                    candidates.push({ name, pct: yesPct });
                }

                candidates.sort((a, b) => b.pct - a.pct);

                container.innerHTML = candidates.map((c, i) => {
                    const rank = i + 1;
                    const rankClass = rank <= 3 ? ` rank-${rank}` : '';
                    const pctClass = c.pct < 1 ? ' low' : '';
                    const badge = rank <= 3
                        ? TROPHY_SVG
                        : rank;

                    return `
                        <div class="candidate${rankClass}">
                            <div class="candidate-left">
                                <div class="rank-badge">${badge}</div>
                                <div class="candidate-info">
                                    <div class="name">${c.name}</div>
                                    <div class="bar-bg">
                                        <div class="bar-fill" style="width:${Math.min(c.pct, 100)}%"></div>
                                    </div>
                                </div>
                            </div>
                            <span class="pct${pctClass}">${formatPct(c.pct)}</span>
                        </div>`;
                }).join('');

                const vol24h = event.volume24hr;
                if (vol24h) {
                    document.getElementById('volume').textContent =
                        `24h forgalom: $${Math.round(vol24h).toLocaleString('hu-HU')}`;
                }

                document.getElementById('updated').textContent =
                    `Frissitve: ${new Date().toLocaleString('hu-HU')}`;

            } catch (err) {
                container.innerHTML = `<p class="error">Nem sikerult betolteni az adatokat.<br>${err.message}</p>`;
            }
        }

        fetchOdds();
        setInterval(fetchOdds, 60000);
    </script>
</body>
</html>
